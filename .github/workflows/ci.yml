---
name: CI/CD
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
permissions:
  contents: read
jobs:
  github-actions-lint-and-scan:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: dceoy/gh-actions-for-devops/.github/workflows/github-actions-lint-and-scan.yml@main   # zizmor: ignore[unpinned-uses]
    with:
      search-path: .github/workflows
      go-version: stable
      python-version: 3.x
  python-lint-and-scan:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
    permissions:
      contents: read
    uses: dceoy/gh-actions-for-devops/.github/workflows/python-package-lint-and-scan.yml@main   # zizmor: ignore[unpinned-uses]
    with:
      package-path: .
  python-test:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
    permissions:
      contents: read
    uses: dceoy/gh-actions-for-devops/.github/workflows/python-package-test.yml@main  # zizmor: ignore[unpinned-uses]
    with:
      package-path: .
  github-codeql-analysis:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: dceoy/gh-actions-for-devops/.github/workflows/github-codeql-analysis.yml@main  # zizmor: ignore[unpinned-uses]
    with:
      language: >
        ["python"]
  okf-hugo-build:
    if: >
      github.event_name == 'push'
      || github.event_name == 'pull_request'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39   # v8.2.0
      - run: uv sync --all-groups
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
      - name: Install Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: latest
          extended: true
      - run: uv run python tools/okf_hugo_adapter.py --src okf --dst content/knowledge --check
      - run: hugo --gc --minify
  hugo-deploy-to-gh-pages:
    if: >
      github.event_name == 'push'
    needs:
      - github-actions-lint-and-scan
      - python-lint-and-scan
      - python-test
      - okf-hugo-build
    permissions:
      contents: read
      id-token: write
      pages: write
    uses: dceoy/gh-actions-for-devops/.github/workflows/hugo-deploy-to-gh-pages.yml@main   # zizmor: ignore[unpinned-uses]
    with:
      site-path: .
      go-version: stable
      base-url: https://dceoy.github.io/aims/
      destination-dir: site
  dependabot-auto-merge:
    if: >
      github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    needs:
      - github-actions-lint-and-scan
      - python-lint-and-scan
      - python-test
      - github-codeql-analysis
      - okf-hugo-build
    permissions:
      contents: write
      pull-requests: write
      actions: read
      checks: read
      statuses: read
    uses: dceoy/gh-actions-for-devops/.github/workflows/dependabot-auto-merge.yml@main  # zizmor: ignore[unpinned-uses]
    with:
      unconditional: true
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
