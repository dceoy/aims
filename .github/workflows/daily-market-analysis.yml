---
name: Daily market analysis
# checkov:skip=CKV_GHA_7: inputs are analysis params (date/interval/dry_run) for authorised manual backfills
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      analysis_date:
        description: "Analysis date (YYYY-MM-DD; default: today UTC)"
        required: false
        type: string
      interval:
        description: "Price bar interval (d/w/m)"
        required: false
        default: d
        type: choice
        options:
          - d
          - w
          - m
      dry_run:
        description: "Skip PR creation and Slack success notification"
        required: false
        default: "false"
        type: boolean
      skip_qualitative:
        description: "Skip the AI qualitative analysis steps for this run"
        required: false
        default: "false"
        type: boolean
      ai_commentary:
        description: "Render AI commentary (default: AI_COMMENTARY_ENABLED repo variable)"
        required: false
        default: default
        type: choice
        options:
          - default
          - "on"
          - "off"
      min_success_ratio:
        description: "Minimum symbol fetch success ratio (default 0.8)"
        required: false
        default: "0.8"
        type: string
      max_missing_symbols:
        description: "Maximum allowed missing symbols (default 4)"
        required: false
        default: "4"
        type: string
      provider:
        description: "Market data provider"
        required: false
        default: yfinance
        type: choice
        options:
          - yfinance
          - stooq
permissions:
  contents: read
jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      ANALYSIS_DATE: ${{ inputs.analysis_date || '' }}
      INTERVAL: ${{ inputs.interval || 'd' }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      MIN_SUCCESS_RATIO: ${{ inputs.min_success_ratio || '0.8' }}
      MAX_MISSING_SYMBOLS: ${{ inputs.max_missing_symbols || '4' }}
      PROVIDER: ${{ inputs.provider || 'yfinance' }}
      SLACK_NOTIFICATIONS_ENABLED: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
      # Qualitative steps run only when the optional ANTHROPIC_API_KEY secret
      # exists (mirroring SLACK_NOTIFICATIONS_ENABLED); without it the run is
      # byte-for-byte today's behavior.
      QUALITATIVE_ENABLED: ${{ secrets.ANTHROPIC_API_KEY != '' }}
      SKIP_QUALITATIVE: ${{ inputs.skip_qualitative || 'false' }}
      # Rendering switch (shadow-mode exit, roadmap #98): the per-run input
      # overrides the default-off AI_COMMENTARY_ENABLED repository variable.
      AI_COMMENTARY_INPUT: ${{ inputs.ai_commentary || 'default' }}
      AI_COMMENTARY_VAR: ${{ vars.AI_COMMENTARY_ENABLED || 'false' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39   # v8.2.0
      - name: Sync dependencies
        run: uv sync
      - name: Validate CFD instruments
        run: |
          uv run python \
            .agents/skills/update-cfd-instruments/scripts/validate_cfd_instruments.py \
            --input data/cfd_instruments.csv \
            --schema data/schema/cfd_instruments.schema.json
      - name: Validate instrument mappings
        run: |
          uv run python \
            .agents/skills/market-analysis/scripts/validate_instrument_mappings.py \
            --input data/mappings/canonical_instrument_mappings.csv \
            --cfd-instruments data/cfd_instruments.csv
      - name: Set analysis date
        id: date
        run: |
          if [ -n "$ANALYSIS_DATE" ]; then
            DATE="$ANALYSIS_DATE"
          else
            DATE="$(date -u +%Y-%m-%d)"
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          # Interval-aware output stem: "d" (the default/scheduled interval)
          # keeps the plain date for backward compatibility; "w"/"m" get a
          # suffix so a manual dispatch cannot collide with the same date's
          # daily artifact/history/report/PR branch. Mirrors
          # aims.market_analysis.artifact_interval_suffix.
          if [ "$INTERVAL" = "d" ]; then
            STEM="$DATE"
          else
            STEM="${DATE}-${INTERVAL}"
          fi
          echo "stem=$STEM" >> "$GITHUB_OUTPUT"
      - name: Load symbols
        id: symbols
        env:
          MAPPING_FILE: data/mappings/canonical_instrument_mappings.csv
        run: |
          SYMBOLS=$(uv run python -c "
          from pathlib import Path
          from aims.market_analysis import load_instrument_mappings, symbols_from_mappings
          rows = load_instrument_mappings(Path('${MAPPING_FILE}'))
          print(','.join(symbols_from_mappings(rows, '${PROVIDER}', '${INTERVAL}')))
          ")
          echo "symbols=$SYMBOLS" >> "$GITHUB_OUTPUT"
          if [ -z "$SYMBOLS" ]; then
            echo "WARNING: no symbols found in ${MAPPING_FILE} for" \
              "provider=${PROVIDER} interval=${INTERVAL}; skipping fetch."
          fi
      - name: Fetch market data
        if: steps.symbols.outputs.symbols != ''
        env:
          DATE: ${{ steps.date.outputs.date }}
          SYMBOLS: ${{ steps.symbols.outputs.symbols }}
        run: |
          START=$(uv run python -c "
          from datetime import datetime, timedelta
          from aims.policy import fetch_window_days
          d = datetime.strptime('${DATE}', '%Y-%m-%d')
          window = fetch_window_days('${INTERVAL}')
          print((d - timedelta(days=window)).strftime('%Y-%m-%d'))
          ")
          FETCH_STATUS="data/prices/fetch_status_${INTERVAL}.json"
          uv run python .agents/skills/market-analysis/scripts/market_analysis.py \
            init-fetch-status \
            --symbols "${SYMBOLS}" \
            --interval "$INTERVAL" \
            --analysis-date "${DATE}" \
            --provider "$PROVIDER" \
            --output "${FETCH_STATUS}"
          IFS=',' read -ra SYMS <<< "${SYMBOLS}"
          for SYM in "${SYMS[@]}"; do
            uv run python .agents/skills/market-analysis/scripts/market_analysis.py \
              fetch --symbol "$SYM" --start "$START" --end "$DATE" \
              --interval "$INTERVAL" \
              --provider "$PROVIDER" \
              --fetch-status "${FETCH_STATUS}" \
              || echo "WARNING: fetch failed for $SYM; symbol will be marked missing in artifact"
          done
      - name: Generate analysis artifact
        if: steps.symbols.outputs.symbols != ''
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          uv run python .agents/skills/market-analysis/scripts/market_analysis.py \
            generate \
            --mapping data/mappings/canonical_instrument_mappings.csv \
            --interval "$INTERVAL" \
            --analysis-date "${DATE}" \
            --provider "$PROVIDER" \
            --fetch-status "data/prices/fetch_status_${INTERVAL}.json" \
            --min-success-ratio "${MIN_SUCCESS_RATIO}" \
            --max-missing-symbols "${MAX_MISSING_SYMBOLS}" \
            --output data/analysis/
      - name: Validate artifact
        if: steps.symbols.outputs.symbols != ''
        env:
          STEM: ${{ steps.date.outputs.stem }}
        run: |
          uv run python .agents/skills/market-analysis/scripts/validate_analysis.py \
            --input "data/analysis/${STEM}.json"
      - name: Generate score history
        if: steps.symbols.outputs.symbols != ''
        env:
          STEM: ${{ steps.date.outputs.stem }}
        run: |
          uv run python .agents/skills/market-analysis/scripts/generate_history.py \
            --input "data/analysis/${STEM}.json" \
            --analysis-dir data/analysis \
            --output data/history
      - name: Validate score history
        if: steps.symbols.outputs.symbols != ''
        env:
          STEM: ${{ steps.date.outputs.stem }}
        run: |
          uv run python .agents/skills/market-analysis/scripts/validate_history.py \
            --input "data/history/${STEM}.json"
      - name: Validate calendars
        if: steps.symbols.outputs.symbols != ''
        run: |
          for CAL in data/calendars/*.json; do
            uv run python \
              .agents/skills/qualitative-analysis/scripts/validate_calendar.py \
              --input "$CAL"
          done
      # Shadow mode (#95): evidence and qualitative artifacts are generated,
      # validated, gated, and committed in the analysis PR, but rendering
      # stays off until AI_COMMENTARY_ENABLED flips after the shadow-mode
      # exit criteria on #98 are met. Any failure here is non-fatal
      # (fail-open): the quantitative report publishes unchanged and the
      # Slack success message carries a warning.
      - name: Run qualitative analysis (shadow mode)
        id: qualitative
        if: steps.symbols.outputs.symbols != '' && env.QUALITATIVE_ENABLED == 'true' && env.SKIP_QUALITATIVE != 'true'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATE: ${{ steps.date.outputs.date }}
          STEM: ${{ steps.date.outputs.stem }}
        run: |
          uv run python \
            .agents/skills/qualitative-analysis/scripts/fetch_evidence.py \
            --mapping data/mappings/canonical_instrument_mappings.csv \
            --sources data/mappings/evidence_sources.csv \
            --analysis-date "${DATE}" \
            --interval "$INTERVAL" \
            --provider "$PROVIDER" \
            --output data/evidence/
          uv run python \
            .agents/skills/qualitative-analysis/scripts/validate_evidence.py \
            --input "data/evidence/${STEM}.json"
          uv run python \
            .agents/skills/qualitative-analysis/scripts/qualitative_analysis.py \
            --analysis "data/analysis/${STEM}.json" \
            --evidence "data/evidence/${STEM}.json" \
            --calendar data/calendars/macro_events.json \
            --calendar data/calendars/earnings.json \
            --output data/qualitative/
          if [ -f "data/qualitative/${STEM}.json" ]; then
            uv run python \
              .agents/skills/qualitative-analysis/scripts/validate_qualitative.py \
              --input "data/qualitative/${STEM}.json" \
              --analysis "data/analysis/${STEM}.json" \
              --evidence "data/evidence/${STEM}.json"
          fi
      - name: Generate Hugo report
        if: steps.symbols.outputs.symbols != ''
        env:
          STEM: ${{ steps.date.outputs.stem }}
          QUALITATIVE_OUTCOME: ${{ steps.qualitative.outcome }}
        run: |
          ARGS=(
            --input "data/analysis/${STEM}.json"
            --history "data/history/${STEM}.json"
            --calendar data/calendars/macro_events.json
            --calendar data/calendars/earnings.json
            --output content/results/
          )
          case "$AI_COMMENTARY_INPUT" in
            on) AI_COMMENTARY=true ;;
            off) AI_COMMENTARY=false ;;
            *) AI_COMMENTARY="$AI_COMMENTARY_VAR" ;;
          esac
          # The qualitative step is continue-on-error, so a file can exist on
          # disk even after its own validate_qualitative.py call failed
          # (e.g. generation succeeded but validation didn't). Rendering
          # must fail open in that case, so require the step's own outcome
          # to be "success" in addition to file existence.
          if [ "$AI_COMMENTARY" = "true" ] \
            && [ "$QUALITATIVE_OUTCOME" = "success" ] \
            && [ -f "data/qualitative/${STEM}.json" ]; then
            ARGS+=(
              --qualitative "data/qualitative/${STEM}.json"
              --evidence "data/evidence/${STEM}.json"
            )
          fi
          uv run python .agents/skills/market-analysis/scripts/generate_report.py \
            "${ARGS[@]}"
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
      - name: Install Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: latest
          extended: true
      - name: Build Hugo site (validation)
        run: hugo --gc --minify
      - name: Create pull request
        id: pr
        if: steps.symbols.outputs.symbols != '' && env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATE: ${{ steps.date.outputs.date }}
          STEM: ${{ steps.date.outputs.stem }}
        run: |
          BRANCH="generated/analysis-${STEM}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          git fetch origin "$BRANCH" 2>/dev/null || true
          git checkout -B "$BRANCH"
          git add data/analysis/ data/history/ content/results/
          # Evidence and qualitative artifacts (shadow mode) travel in the
          # same analysis PR; the directories exist only when the
          # qualitative steps ran.
          for QUAL_DIR in data/evidence data/qualitative; do
            if [ -d "$QUAL_DIR" ]; then
              git add "$QUAL_DIR"
            fi
          done
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "pr_url=" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          else
            git commit -m "feat(analysis): daily market analysis ${DATE}"
            git push --force-with-lease -u origin "$BRANCH"
            PR_NUMBER="$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')"
            if [ -n "$PR_NUMBER" ]; then
              echo "PR #$PR_NUMBER already exists for $BRANCH; branch updated."
              PR_URL=$(gh pr view "$PR_NUMBER" --json url --jq '.url')
            else
              PR_URL=$(gh pr create \
                --title "feat(analysis): daily market analysis ${DATE}" \
                --body "Automated daily market analysis for ${DATE}." \
                --base main \
                --head "$BRANCH")
              PR_NUMBER="$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')"
            fi
            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi
      - name: Merge analysis pull request
        if: steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          # All validation (artifact/history schema checks, Hugo build) has
          # already run earlier in this job, so merge immediately instead of
          # requesting `--auto`: main has no branch protection or required
          # status checks, and GitHub only allows auto-merge to be enabled on
          # a PR whose merge is blocked by such requirements, so `--auto`
          # fails outright here. A failed merge must fail this step (no
          # `|| echo` masking) so it routes into "Notify Slack (failure)".
          gh pr merge "$PR_NUMBER" --squash --delete-branch
      - name: Notify Slack (success)
        if: steps.symbols.outputs.symbols != '' && env.DRY_RUN != 'true' && env.SLACK_NOTIFICATIONS_ENABLED == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STEM: ${{ steps.date.outputs.stem }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          QUALITATIVE_OUTCOME: ${{ steps.qualitative.outcome }}
        run: |
          ARGS=(
            --artifact "data/analysis/${STEM}.json"
            --history "data/history/${STEM}.json"
            --pr-url "${PR_URL}"
            --calendar data/calendars/macro_events.json
            --calendar data/calendars/earnings.json
          )
          # As in the report-render step, only trust the file once its own
          # step outcome confirms generation and validation both succeeded.
          if [ "$QUALITATIVE_OUTCOME" = "success" ] \
            && [ -f "data/qualitative/${STEM}.json" ]; then
            ARGS+=(--qualitative "data/qualitative/${STEM}.json")
          fi
          if [ "$QUALITATIVE_OUTCOME" = "failure" ]; then
            ARGS+=(--qualitative-failed)
          fi
          uv run python .agents/skills/market-analysis/scripts/notify_slack.py \
            "${ARGS[@]}"
      - name: Notify Slack (failure)
        if: failure() && env.SLACK_NOTIFICATIONS_ENABLED == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          uv run python .agents/skills/market-analysis/scripts/notify_slack.py \
            --failure \
            --run-url \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --message "Daily market analysis workflow failed"
