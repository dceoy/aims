---
name: Daily market analysis
# checkov:skip=CKV_GHA_7: inputs are analysis params (date/interval/dry_run) for authorised manual backfills
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      analysis_date:
        description: "Analysis date (YYYY-MM-DD; default: today UTC)"
        required: false
        type: string
      interval:
        description: "Price bar interval (d/w/m)"
        required: false
        default: d
        type: choice
        options:
          - d
          - w
          - m
      dry_run:
        description: "Skip PR creation and Slack success notification"
        required: false
        default: "false"
        type: boolean
      min_success_ratio:
        description: "Minimum symbol fetch success ratio (default 0.8)"
        required: false
        default: "0.8"
        type: string
      max_missing_symbols:
        description: "Maximum allowed missing symbols (default 4)"
        required: false
        default: "4"
        type: string
      provider:
        description: "Market data provider"
        required: false
        default: yfinance
        type: choice
        options:
          - yfinance
          - stooq
      skip_qualitative:
        description: "Skip evidence fetch and AI qualitative analysis"
        required: false
        default: "false"
        type: boolean
permissions:
  contents: read
jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      ANALYSIS_DATE: ${{ inputs.analysis_date || '' }}
      INTERVAL: ${{ inputs.interval || 'd' }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      MIN_SUCCESS_RATIO: ${{ inputs.min_success_ratio || '0.8' }}
      MAX_MISSING_SYMBOLS: ${{ inputs.max_missing_symbols || '4' }}
      PROVIDER: ${{ inputs.provider || 'yfinance' }}
      SKIP_QUALITATIVE: ${{ inputs.skip_qualitative || 'false' }}
      SLACK_NOTIFICATIONS_ENABLED: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
      QUALITATIVE_ENABLED: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39   # v8.2.0
      - name: Sync dependencies
        run: uv sync
      - name: Validate CFD instruments
        run: |
          uv run python \
            .agents/skills/update-cfd-instruments/scripts/validate_cfd_instruments.py \
            --input data/cfd_instruments.csv \
            --schema data/schema/cfd_instruments.schema.json
      - name: Set analysis date
        id: date
        run: |
          if [ -n "$ANALYSIS_DATE" ]; then
            echo "date=$ANALYSIS_DATE" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi
      - name: Load symbols
        id: symbols
        env:
          MAPPING_FILE: data/mappings/canonical_instrument_mappings.csv
        run: |
          SYMBOLS=$(uv run python -c "
          from pathlib import Path
          from aims.market_analysis import load_instrument_mappings, symbols_from_mappings
          rows = load_instrument_mappings(Path('${MAPPING_FILE}'))
          print(','.join(symbols_from_mappings(rows, '${PROVIDER}', '${INTERVAL}')))
          ")
          echo "symbols=$SYMBOLS" >> "$GITHUB_OUTPUT"
          if [ -z "$SYMBOLS" ]; then
            echo "WARNING: no symbols found in ${MAPPING_FILE} for" \
              "provider=${PROVIDER} interval=${INTERVAL}; skipping fetch."
          fi
      - name: Fetch market data
        if: steps.symbols.outputs.symbols != ''
        env:
          DATE: ${{ steps.date.outputs.date }}
          SYMBOLS: ${{ steps.symbols.outputs.symbols }}
        run: |
          START=$(python3 -c "
          from datetime import datetime, timedelta
          d = datetime.strptime('${DATE}', '%Y-%m-%d')
          print((d - timedelta(days=365)).strftime('%Y-%m-%d'))
          ")
          FETCH_STATUS="data/prices/fetch_status_${INTERVAL}.json"
          uv run python .agents/skills/market-analysis/scripts/market_analysis.py \
            init-fetch-status \
            --symbols "${SYMBOLS}" \
            --interval "$INTERVAL" \
            --analysis-date "${DATE}" \
            --provider "$PROVIDER" \
            --output "${FETCH_STATUS}"
          IFS=',' read -ra SYMS <<< "${SYMBOLS}"
          for SYM in "${SYMS[@]}"; do
            uv run python .agents/skills/market-analysis/scripts/market_analysis.py \
              fetch --symbol "$SYM" --start "$START" --end "$DATE" \
              --interval "$INTERVAL" \
              --provider "$PROVIDER" \
              --fetch-status "${FETCH_STATUS}" \
              || echo "WARNING: fetch failed for $SYM; symbol will be marked missing in artifact"
          done
      - name: Generate analysis artifact
        if: steps.symbols.outputs.symbols != ''
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          uv run python .agents/skills/market-analysis/scripts/market_analysis.py \
            generate \
            --mapping data/mappings/canonical_instrument_mappings.csv \
            --interval "$INTERVAL" \
            --analysis-date "${DATE}" \
            --provider "$PROVIDER" \
            --fetch-status "data/prices/fetch_status_${INTERVAL}.json" \
            --min-success-ratio "${MIN_SUCCESS_RATIO}" \
            --max-missing-symbols "${MAX_MISSING_SYMBOLS}" \
            --output data/analysis/
      - name: Validate artifact
        if: steps.symbols.outputs.symbols != ''
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          uv run python .agents/skills/market-analysis/scripts/validate_analysis.py \
            --input "data/analysis/${DATE}.json"
      - name: Generate score history
        if: steps.symbols.outputs.symbols != ''
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          uv run python .agents/skills/market-analysis/scripts/generate_history.py \
            --input "data/analysis/${DATE}.json" \
            --analysis-dir data/analysis \
            --output data/history
      - name: Validate score history
        if: steps.symbols.outputs.symbols != ''
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          uv run python .agents/skills/market-analysis/scripts/validate_history.py \
            --input "data/history/${DATE}.json"
      - name: Update earnings calendar
        if: steps.symbols.outputs.symbols != ''
        run: |
          # Deterministic calendar refresh; failures never block publication.
          if uv run python \
            .agents/skills/qualitative-analysis/scripts/update_calendars.py \
            fetch-earnings \
            --mapping data/mappings/canonical_instrument_mappings.csv \
            --provider "$PROVIDER" \
            --interval "$INTERVAL" \
            --output data/calendars/earnings.json; then
            echo "Earnings calendar refreshed."
          else
            echo "WARNING: earnings calendar refresh failed;" \
              "continuing with committed calendars."
          fi
      - name: Validate calendars
        id: calendars
        if: steps.symbols.outputs.symbols != ''
        run: |
          CALENDAR_OK=true
          for FILE in data/calendars/*.json; do
            uv run python \
              .agents/skills/qualitative-analysis/scripts/update_calendars.py \
              validate --input "$FILE" || CALENDAR_OK=false
          done
          if [ "$CALENDAR_OK" != "true" ]; then
            echo "WARNING: calendar validation failed;" \
              "the report will omit the Upcoming Events section."
          fi
          echo "calendar_ok=$CALENDAR_OK" >> "$GITHUB_OUTPUT"
      - name: Generate AI qualitative analysis
        if: >-
          steps.symbols.outputs.symbols != ''
          && env.QUALITATIVE_ENABLED == 'true'
          && env.SKIP_QUALITATIVE != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DATE: ${{ steps.date.outputs.date }}
        run: |
          # Fail-open: any failure below logs a warning, removes the partial
          # outputs, and the quantitative report publishes unchanged.
          SCRIPTS=.agents/skills/qualitative-analysis/scripts
          if uv run python "$SCRIPTS/fetch_evidence.py" fetch \
              --mapping data/mappings/canonical_instrument_mappings.csv \
              --provider "$PROVIDER" \
              --interval "$INTERVAL" \
              --sources data/mappings/evidence_sources.csv \
              --analysis-date "${DATE}" \
              --output data/evidence/ \
            && uv run python "$SCRIPTS/fetch_evidence.py" validate \
              --input "data/evidence/${DATE}.json" \
            && uv run python "$SCRIPTS/generate_qualitative.py" \
              --analysis "data/analysis/${DATE}.json" \
              --evidence "data/evidence/${DATE}.json" \
              --calendar-dir data/calendars \
              --output data/qualitative/ \
            && uv run python "$SCRIPTS/validate_qualitative.py" \
              --input "data/qualitative/${DATE}.json" \
              --evidence "data/evidence/${DATE}.json" \
              --analysis "data/analysis/${DATE}.json"; then
            echo "Qualitative artifact generated and validated."
          else
            echo "WARNING: qualitative analysis failed;" \
              "publishing quantitative-only report."
            rm -f "data/evidence/${DATE}.json" "data/qualitative/${DATE}.json"
          fi
      - name: Generate Hugo report
        if: steps.symbols.outputs.symbols != ''
        env:
          DATE: ${{ steps.date.outputs.date }}
          CALENDAR_OK: ${{ steps.calendars.outputs.calendar_ok }}
        run: |
          EXTRA_ARGS=()
          if [ "$CALENDAR_OK" = "true" ]; then
            EXTRA_ARGS+=(--calendar-dir data/calendars)
          fi
          if [ -f "data/qualitative/${DATE}.json" ]; then
            EXTRA_ARGS+=(--qualitative "data/qualitative/${DATE}.json")
          fi
          uv run python .agents/skills/market-analysis/scripts/generate_report.py \
            --input "data/analysis/${DATE}.json" \
            --history "data/history/${DATE}.json" \
            --output content/results/ \
            "${EXTRA_ARGS[@]}"
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
      - name: Install Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: latest
          extended: true
      - name: Build Hugo site (validation)
        run: hugo --gc --minify
      - name: Create pull request
        id: pr
        if: steps.symbols.outputs.symbols != '' && env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATE: ${{ steps.date.outputs.date }}
        run: |
          BRANCH="generated/analysis-${DATE}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          git fetch origin "$BRANCH" 2>/dev/null || true
          git checkout -B "$BRANCH"
          git add data/analysis/ data/history/ content/results/
          for DIR in data/evidence data/qualitative data/calendars; do
            if [ -d "$DIR" ]; then
              git add "$DIR"
            fi
          done
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "pr_url=" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          else
            git commit -m "feat(analysis): daily market analysis ${DATE}"
            git push --force-with-lease -u origin "$BRANCH"
            PR_NUMBER="$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')"
            if [ -n "$PR_NUMBER" ]; then
              echo "PR #$PR_NUMBER already exists for $BRANCH; branch updated."
              PR_URL=$(gh pr view "$PR_NUMBER" --json url --jq '.url')
            else
              PR_URL=$(gh pr create \
                --title "feat(analysis): daily market analysis ${DATE}" \
                --body "Automated daily market analysis for ${DATE}." \
                --base main \
                --head "$BRANCH")
              PR_NUMBER="$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')"
            fi
            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi
      - name: Enable auto-merge for analysis pull request
        if: steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          # Merges automatically once required status checks (lint, type check,
          # tests, Hugo build) pass. If branch protection requires review, the
          # PR waits for that review instead of merging — no gate is bypassed.
          # Requires "Allow auto-merge" enabled in repository settings; if it
          # is not enabled, this warns and the PR falls back to manual merge.
          gh pr merge "$PR_NUMBER" --auto --squash --delete-branch \
            || echo "WARNING: could not enable auto-merge for PR #$PR_NUMBER;" \
              "enable 'Allow auto-merge' in repository settings or merge manually."
      - name: Notify Slack (success)
        if: steps.symbols.outputs.symbols != '' && env.DRY_RUN != 'true' && env.SLACK_NOTIFICATIONS_ENABLED == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DATE: ${{ steps.date.outputs.date }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          CALENDAR_OK: ${{ steps.calendars.outputs.calendar_ok }}
        run: |
          EXTRA_ARGS=()
          if [ -f "data/qualitative/${DATE}.json" ]; then
            EXTRA_ARGS+=(--qualitative "data/qualitative/${DATE}.json")
          fi
          if [ "$CALENDAR_OK" = "true" ]; then
            EXTRA_ARGS+=(--calendar-dir data/calendars)
          fi
          uv run python .agents/skills/market-analysis/scripts/notify_slack.py \
            --artifact "data/analysis/${DATE}.json" \
            --history "data/history/${DATE}.json" \
            --pr-url "${PR_URL}" \
            "${EXTRA_ARGS[@]}"
      - name: Notify Slack (failure)
        if: failure() && env.SLACK_NOTIFICATIONS_ENABLED == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          uv run python .agents/skills/market-analysis/scripts/notify_slack.py \
            --failure \
            --run-url \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --message "Daily market analysis workflow failed"
