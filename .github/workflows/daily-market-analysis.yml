---
name: Daily market analysis
# checkov:skip=CKV_GHA_7: inputs are analysis params (date/interval/dry_run) for authorised manual backfills
on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      analysis_date:
        description: "Analysis date (YYYY-MM-DD; default: today UTC)"
        required: false
        type: string
      interval:
        description: "Price bar interval (d/w/m)"
        required: false
        default: d
        type: choice
        options:
          - d
          - w
          - m
      dry_run:
        description: "Skip PR creation and Slack success notification"
        required: false
        default: "false"
        type: boolean
      skip_qualitative:
        description: "Skip the AI qualitative analysis steps for this run"
        required: false
        default: "false"
        type: boolean
      ai_commentary:
        description: "Render AI commentary (default: AI_COMMENTARY_ENABLED repo variable)"
        required: false
        default: default
        type: choice
        options:
          - default
          - "on"
          - "off"
      min_success_ratio:
        description: "Minimum symbol fetch success ratio (default 0.8)"
        required: false
        default: "0.8"
        type: string
      max_missing_symbols:
        description: "Maximum allowed missing symbols (default 4)"
        required: false
        default: "4"
        type: string
      provider:
        description: "Market data provider"
        required: false
        default: yfinance
        type: choice
        options:
          - yfinance
          - stooq
permissions:
  contents: read
jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      ANALYSIS_DATE: ${{ inputs.analysis_date || '' }}
      INTERVAL: ${{ inputs.interval || 'd' }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
      MIN_SUCCESS_RATIO: ${{ inputs.min_success_ratio || '0.8' }}
      MAX_MISSING_SYMBOLS: ${{ inputs.max_missing_symbols || '4' }}
      PROVIDER: ${{ inputs.provider || 'yfinance' }}
      # Retried when the primary provider's coverage gate fails (#81); the
      # other of the two registered providers with a daily symbol universe.
      FALLBACK_PROVIDER: >-
        ${{ (inputs.provider || 'yfinance') == 'stooq' && 'yfinance' || 'stooq' }}
      SLACK_NOTIFICATIONS_ENABLED: ${{ secrets.SLACK_WEBHOOK_URL != '' }}
      # Qualitative steps run only when the optional Claude Code OAuth secret
      # exists (mirroring SLACK_NOTIFICATIONS_ENABLED); without it the run is
      # byte-for-byte today's behavior.
      QUALITATIVE_ENABLED: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' }}
      SKIP_QUALITATIVE: ${{ inputs.skip_qualitative || 'false' }}
      # Rendering switch (shadow-mode exit, roadmap #98): the per-run input
      # overrides the default-off AI_COMMENTARY_ENABLED repository variable.
      AI_COMMENTARY_INPUT: ${{ inputs.ai_commentary || 'default' }}
      AI_COMMENTARY_VAR: ${{ vars.AI_COMMENTARY_ENABLED || 'false' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0   # v7.0.0
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39   # v8.2.0
      - name: Sync dependencies
        run: uv sync
      - name: Validate CFD instruments
        run: |
          uv run python \
            .agents/skills/update-cfd-instruments/scripts/validate_cfd_instruments.py \
            --input data/cfd_instruments.csv \
            --schema data/schema/cfd_instruments.schema.json
      - name: Validate instrument mappings
        run: |
          uv run python \
            .agents/skills/market-analysis/scripts/validate_instrument_mappings.py \
            --input data/mappings/canonical_instrument_mappings.csv \
            --cfd-instruments data/cfd_instruments.csv
      - name: Set analysis date
        id: date
        run: |
          if [ -n "$ANALYSIS_DATE" ]; then
            DATE="$ANALYSIS_DATE"
          else
            DATE="$(date -u +%Y-%m-%d)"
          fi
          echo "date=$DATE" >> "$GITHUB_OUTPUT"
          # Interval-aware output stem: "d" (the default/scheduled interval)
          # keeps the plain date for backward compatibility; "w"/"m" get a
          # suffix so a manual dispatch cannot collide with the same date's
          # daily artifact/history/report/PR branch. Mirrors
          # aims.market_analysis.artifact_interval_suffix.
          if [ "$INTERVAL" = "d" ]; then
            STEM="$DATE"
          else
            STEM="${DATE}-${INTERVAL}"
          fi
          echo "stem=$STEM" >> "$GITHUB_OUTPUT"
          # Cross-provider consistency check runs weekly (Monday) rather than
          # daily to avoid doubling fetch volume every run.
          echo "is_monday=$([ "$(date -u -d "$DATE" +%u)" = 1 ] && echo true || echo false)" \
            >> "$GITHUB_OUTPUT"
      - name: Load symbols
        id: symbols
        env:
          MAPPING_FILE: data/mappings/canonical_instrument_mappings.csv
        run: |
          SYMBOLS=$(uv run python -c "
          from pathlib import Path
          from aims.market_analysis import load_instrument_mappings, symbols_from_mappings
          rows = load_instrument_mappings(Path('${MAPPING_FILE}'))
          print(','.join(symbols_from_mappings(rows, '${PROVIDER}', '${INTERVAL}')))
          ")
          echo "symbols=$SYMBOLS" >> "$GITHUB_OUTPUT"
          if [ -z "$SYMBOLS" ]; then
            echo "WARNING: no symbols found in ${MAPPING_FILE} for" \
              "provider=${PROVIDER} interval=${INTERVAL}; skipping fetch."
          fi
      # Persistent multi-year price store (#78): kept across runs via
      # Actions cache instead of a fixed daily refetch, so long-horizon
      # features and backtests have real history. Derived data only, per
      # provider redistribution terms; see OPERATIONS.md for the rebuild
      # and drift runbooks.
      - name: Restore persistent price store
        if: steps.symbols.outputs.symbols != ''
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9   # v6.1.0
        with:
          path: data/store
          key: prices-store-${{ env.INTERVAL }}-v1-${{ steps.date.outputs.date }}
          restore-keys: |
            prices-store-${{ env.INTERVAL }}-v1-
      - name: Update persistent price store
        if: steps.symbols.outputs.symbols != ''
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          uv run python .agents/skills/market-analysis/scripts/market_analysis.py \
            update-store \
            --mapping data/mappings/canonical_instrument_mappings.csv \
            --interval "$INTERVAL" \
            --provider "$PROVIDER" \
            --store-dir data/store \
            --as-of "${DATE}" \
            --output-report "data/run/price_history_${INTERVAL}.json" \
            --fetch-status "data/run/fetch_status_${INTERVAL}.json"
      - name: Fetch market data (secondary provider, weekly consistency check)
        if: steps.symbols.outputs.symbols != '' && steps.date.outputs.is_monday == 'true'
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          START=$(uv run python -c "
          from datetime import datetime, timedelta
          from aims.policy import fetch_window_days
          d = datetime.strptime('${DATE}', '%Y-%m-%d')
          window = fetch_window_days('${INTERVAL}')
          print((d - timedelta(days=window)).strftime('%Y-%m-%d'))
          ")
          SECONDARY_SYMBOLS=$(uv run python -c "
          from pathlib import Path
          from aims.market_analysis import load_instrument_mappings, symbols_from_mappings
          rows = load_instrument_mappings(Path('data/mappings/canonical_instrument_mappings.csv'))
          print(','.join(symbols_from_mappings(rows, '${FALLBACK_PROVIDER}', '${INTERVAL}')))
          ")
          IFS=',' read -ra SYMS <<< "${SECONDARY_SYMBOLS}"
          for SYM in "${SYMS[@]}"; do
            uv run python .agents/skills/market-analysis/scripts/market_analysis.py \
              fetch --symbol "$SYM" --start "$START" --end "$DATE" \
              --interval "$INTERVAL" \
              --provider "$FALLBACK_PROVIDER" \
              --output "data/prices-secondary" \
              || echo "WARNING: secondary-provider fetch failed for $SYM; excluded from consistency check"
          done
      - name: Cross-provider consistency check
        if: steps.symbols.outputs.symbols != '' && steps.date.outputs.is_monday == 'true'
        run: |
          uv run python .agents/skills/market-analysis/scripts/market_analysis.py \
            consistency \
            --mapping data/mappings/canonical_instrument_mappings.csv \
            --interval "$INTERVAL" \
            --primary-provider "$PROVIDER" \
            --secondary-provider "$FALLBACK_PROVIDER" \
            --primary-data-dir data/store \
            --secondary-data-dir data/prices-secondary \
            --output "data/run/consistency_${INTERVAL}.json"
      - name: Generate analysis artifact
        id: generate_primary
        if: steps.symbols.outputs.symbols != ''
        continue-on-error: true
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          ARGS=(
            --mapping data/mappings/canonical_instrument_mappings.csv
            --interval "$INTERVAL"
            --analysis-date "${DATE}"
            --provider "$PROVIDER"
            --data-dir data/store
            --fetch-status "data/run/fetch_status_${INTERVAL}.json"
            --min-success-ratio "${MIN_SUCCESS_RATIO}"
            --max-missing-symbols "${MAX_MISSING_SYMBOLS}"
            --output data/analysis/
          )
          if [ -f "data/run/consistency_${INTERVAL}.json" ]; then
            ARGS+=(--price-consistency "data/run/consistency_${INTERVAL}.json")
          fi
          if [ -f "data/run/price_history_${INTERVAL}.json" ]; then
            ARGS+=(--price-history "data/run/price_history_${INTERVAL}.json")
          fi
          uv run python .agents/skills/market-analysis/scripts/market_analysis.py \
            generate "${ARGS[@]}"
      - name: Fetch market data (fallback provider)
        if: steps.symbols.outputs.symbols != '' && steps.generate_primary.outcome == 'failure'
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          START=$(uv run python -c "
          from datetime import datetime, timedelta
          from aims.policy import fetch_window_days
          d = datetime.strptime('${DATE}', '%Y-%m-%d')
          window = fetch_window_days('${INTERVAL}')
          print((d - timedelta(days=window)).strftime('%Y-%m-%d'))
          ")
          FALLBACK_SYMBOLS=$(uv run python -c "
          from pathlib import Path
          from aims.market_analysis import load_instrument_mappings, symbols_from_mappings
          rows = load_instrument_mappings(Path('data/mappings/canonical_instrument_mappings.csv'))
          print(','.join(symbols_from_mappings(rows, '${FALLBACK_PROVIDER}', '${INTERVAL}')))
          ")
          FETCH_STATUS="data/prices-fallback/fetch_status_${INTERVAL}.json"
          uv run python .agents/skills/market-analysis/scripts/market_analysis.py \
            init-fetch-status \
            --symbols "${FALLBACK_SYMBOLS}" \
            --interval "$INTERVAL" \
            --analysis-date "${DATE}" \
            --provider "$FALLBACK_PROVIDER" \
            --output "${FETCH_STATUS}"
          IFS=',' read -ra SYMS <<< "${FALLBACK_SYMBOLS}"
          for SYM in "${SYMS[@]}"; do
            uv run python .agents/skills/market-analysis/scripts/market_analysis.py \
              fetch --symbol "$SYM" --start "$START" --end "$DATE" \
              --interval "$INTERVAL" \
              --provider "$FALLBACK_PROVIDER" \
              --fetch-status "${FETCH_STATUS}" \
              --output "data/prices-fallback" \
              || echo "WARNING: fallback fetch failed for $SYM; symbol will be marked missing"
          done
      - name: Generate analysis artifact (fallback provider)
        id: generate_fallback
        if: steps.symbols.outputs.symbols != '' && steps.generate_primary.outcome == 'failure'
        continue-on-error: true
        env:
          DATE: ${{ steps.date.outputs.date }}
        run: |
          uv run python .agents/skills/market-analysis/scripts/market_analysis.py \
            generate \
            --mapping data/mappings/canonical_instrument_mappings.csv \
            --interval "$INTERVAL" \
            --analysis-date "${DATE}" \
            --provider "$FALLBACK_PROVIDER" \
            --data-dir data/prices-fallback \
            --fetch-status "data/prices-fallback/fetch_status_${INTERVAL}.json" \
            --min-success-ratio "${MIN_SUCCESS_RATIO}" \
            --max-missing-symbols "${MAX_MISSING_SYMBOLS}" \
            --output data/analysis/
      - name: Fail if both providers failed to generate a valid artifact
        if: >
          steps.symbols.outputs.symbols != ''
          && steps.generate_primary.outcome == 'failure'
          && steps.generate_fallback.outcome == 'failure'
        run: |
          echo "::error::Both primary ($PROVIDER) and fallback" \
            "($FALLBACK_PROVIDER) providers failed the coverage gate."
          exit 1
      - name: Validate artifact
        if: steps.symbols.outputs.symbols != ''
        env:
          STEM: ${{ steps.date.outputs.stem }}
        run: |
          uv run python .agents/skills/market-analysis/scripts/validate_analysis.py \
            --input "data/analysis/${STEM}.json"
      - name: Generate score history
        if: steps.symbols.outputs.symbols != ''
        env:
          STEM: ${{ steps.date.outputs.stem }}
        run: |
          uv run python .agents/skills/market-analysis/scripts/generate_history.py \
            --input "data/analysis/${STEM}.json" \
            --analysis-dir data/analysis \
            --output data/history
      - name: Validate score history
        if: steps.symbols.outputs.symbols != ''
        env:
          STEM: ${{ steps.date.outputs.stem }}
        run: |
          uv run python .agents/skills/market-analysis/scripts/validate_history.py \
            --input "data/history/${STEM}.json"
      - name: Validate calendars
        if: steps.symbols.outputs.symbols != ''
        run: |
          for CAL in data/calendars/*.json; do
            uv run python \
              .agents/skills/qualitative-analysis/scripts/validate_calendar.py \
              --input "$CAL"
          done
      # Shadow mode (#95): evidence and qualitative artifacts are generated,
      # validated, gated, and committed in the analysis PR, but rendering
      # stays off until AI_COMMENTARY_ENABLED flips after the shadow-mode
      # exit criteria on #98 are met. Any failure here is non-fatal
      # (fail-open): the quantitative report publishes unchanged and the
      # Slack success message carries a warning.
      - name: Prepare qualitative analysis (shadow mode)
        id: qualitative_prepare
        if: steps.symbols.outputs.symbols != '' && env.QUALITATIVE_ENABLED == 'true' && env.SKIP_QUALITATIVE != 'true'
        continue-on-error: true
        env:
          DATE: ${{ steps.date.outputs.date }}
          STEM: ${{ steps.date.outputs.stem }}
        run: |
          uv run python \
            .agents/skills/qualitative-analysis/scripts/fetch_evidence.py \
            --mapping data/mappings/canonical_instrument_mappings.csv \
            --sources data/mappings/evidence_sources.csv \
            --analysis-date "${DATE}" \
            --interval "$INTERVAL" \
            --provider "$PROVIDER" \
            --output data/evidence/
          uv run python \
            .agents/skills/qualitative-analysis/scripts/validate_evidence.py \
            --input "data/evidence/${STEM}.json"
          uv run python \
            .agents/skills/qualitative-analysis/scripts/qualitative_analysis.py \
            prepare \
            --analysis "data/analysis/${STEM}.json" \
            --evidence "data/evidence/${STEM}.json" \
            --calendar data/calendars/macro_events.json \
            --calendar data/calendars/earnings.json \
            --run-dir data/run/qualitative
      - name: Invoke Claude Code Action (attempt 1)
        id: claude_qualitative_1
        if: steps.qualitative_prepare.outcome == 'success' && steps.qualitative_prepare.outputs.ready == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.qualitative_prepare.outputs.prompt }}
          claude_args: >-
            --model claude-opus-4-8 --max-turns 1 --tools ""
            --json-schema '${{ steps.qualitative_prepare.outputs.schema }}'
      - name: Finalize qualitative analysis (attempt 1)
        id: qualitative_finalize_1
        if: steps.claude_qualitative_1.outcome == 'success'
        continue-on-error: true
        env:
          CLAUDE_STRUCTURED_OUTPUT: ${{ steps.claude_qualitative_1.outputs.structured_output }}
        run: |
          uv run python \
            .agents/skills/qualitative-analysis/scripts/qualitative_analysis.py \
            finalize \
            --request data/run/qualitative/request.json \
            --attempt 1 \
            --output data/qualitative/
      - name: Invoke Claude Code Action (single retry)
        id: claude_qualitative_2
        if: steps.qualitative_finalize_1.outputs.retry == 'true'
        continue-on-error: true
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.qualitative_prepare.outputs.prompt }}
          claude_args: >-
            --model claude-opus-4-8 --max-turns 1 --tools ""
            --json-schema '${{ steps.qualitative_prepare.outputs.schema }}'
      - name: Finalize qualitative analysis (single retry)
        id: qualitative_finalize_2
        if: steps.claude_qualitative_2.outcome == 'success'
        continue-on-error: true
        env:
          CLAUDE_STRUCTURED_OUTPUT: ${{ steps.claude_qualitative_2.outputs.structured_output }}
        run: |
          uv run python \
            .agents/skills/qualitative-analysis/scripts/qualitative_analysis.py \
            finalize \
            --request data/run/qualitative/request.json \
            --attempt 2 \
            --output data/qualitative/
      - name: Record qualitative analysis outcome
        id: qualitative
        if: steps.symbols.outputs.symbols != '' && env.QUALITATIVE_ENABLED == 'true' && env.SKIP_QUALITATIVE != 'true'
        continue-on-error: true
        env:
          PREPARE_OUTCOME: ${{ steps.qualitative_prepare.outcome }}
          READY: ${{ steps.qualitative_prepare.outputs.ready }}
          ACTION_1_OUTCOME: ${{ steps.claude_qualitative_1.outcome }}
          FINALIZE_1_OUTCOME: ${{ steps.qualitative_finalize_1.outcome }}
          RETRY: ${{ steps.qualitative_finalize_1.outputs.retry }}
          ACTION_2_OUTCOME: ${{ steps.claude_qualitative_2.outcome }}
          FINALIZE_2_OUTCOME: ${{ steps.qualitative_finalize_2.outcome }}
        run: |
          if [ "$PREPARE_OUTCOME" != "success" ]; then
            exit 1
          fi
          if [ "$READY" != "true" ]; then
            exit 0
          fi
          if [ "$ACTION_1_OUTCOME" != "success" ] \
            || [ "$FINALIZE_1_OUTCOME" != "success" ]; then
            exit 1
          fi
          if [ "$RETRY" = "true" ] \
            && { [ "$ACTION_2_OUTCOME" != "success" ] \
              || [ "$FINALIZE_2_OUTCOME" != "success" ]; }; then
            exit 1
          fi
      # Deterministic stance evaluation (#97): derives forward returns from
      # committed analysis artifacts only, joins them with any accumulated
      # qualitative stances (safe empty state before those exist), and
      # refreshes the public evaluation page. Daily interval only — the
      # forward-return chain is defined over daily bars. Runs after the
      # qualitative-analysis step so that today's own qualitative artifact
      # (if generated) is already on disk and can be included in this run's
      # evaluation inputs instead of appearing only on the next scheduled
      # run. Same trust boundary as report rendering and Slack notification:
      # the same-run qualitative artifact is only trusted once the
      # qualitative step's own outcome confirms generation and validation
      # both succeeded; otherwise it is explicitly excluded by date even if
      # a file is present on disk (that step is continue-on-error). Historical
      # committed qualitative artifacts are never affected by this exclusion.
      - name: Evaluate qualitative stances
        if: steps.symbols.outputs.symbols != '' && env.INTERVAL == 'd'
        env:
          DATE: ${{ steps.date.outputs.date }}
          STEM: ${{ steps.date.outputs.stem }}
          QUALITATIVE_OUTCOME: ${{ steps.qualitative.outcome }}
        run: |
          ARGS=(
            --input "data/analysis/${STEM}.json"
            --analysis-dir data/analysis
            --qualitative-dir data/qualitative
            --output data/performance
            --page-output content/evaluation/_index.md
          )
          if [ "$QUALITATIVE_OUTCOME" != "success" ]; then
            ARGS+=(--exclude-qualitative-date "${DATE}")
          fi
          uv run python \
            .agents/skills/qualitative-analysis/scripts/evaluate_stances.py \
            "${ARGS[@]}"
          uv run python \
            .agents/skills/qualitative-analysis/scripts/validate_performance.py \
            --input "data/performance/${STEM}.json"
      # Realized top-5 signal performance (#82): rebuilt in full from every
      # committed daily analysis artifact, including today's, which is
      # already on disk at this point in the job. Independent of the
      # qualitative steps above, so it always runs for daily intervals.
      - name: Track signal performance
        if: steps.symbols.outputs.symbols != '' && env.INTERVAL == 'd'
        run: |
          uv run python \
            .agents/skills/market-analysis/scripts/track_signal_performance.py \
            --analysis-dir data/analysis \
            --output data/performance/signals.json \
            --page-output content/performance/_index.md
          uv run python \
            .agents/skills/market-analysis/scripts/validate_signal_performance.py \
            --input data/performance/signals.json
      # Citation-validity sampling (#97): probes a bounded, deterministic
      # sample of recent evidence citation URLs so link rot surfaces in the
      # workflow log. Warning only — the script always exits 0 and nothing
      # downstream consumes the outcome.
      - name: Check citation links (warning only)
        if: steps.symbols.outputs.symbols != '' && env.QUALITATIVE_ENABLED == 'true' && env.SKIP_QUALITATIVE != 'true'
        continue-on-error: true
        run: |
          uv run python \
            .agents/skills/qualitative-analysis/scripts/check_citation_links.py \
            --evidence-dir data/evidence
      - name: Generate Hugo report
        if: steps.symbols.outputs.symbols != ''
        env:
          STEM: ${{ steps.date.outputs.stem }}
          QUALITATIVE_OUTCOME: ${{ steps.qualitative.outcome }}
        run: |
          ARGS=(
            --input "data/analysis/${STEM}.json"
            --history "data/history/${STEM}.json"
            --calendar data/calendars/macro_events.json
            --calendar data/calendars/earnings.json
            --output content/results/
          )
          case "$AI_COMMENTARY_INPUT" in
            on) AI_COMMENTARY=true ;;
            off) AI_COMMENTARY=false ;;
            *) AI_COMMENTARY="$AI_COMMENTARY_VAR" ;;
          esac
          # The qualitative step is continue-on-error, so a file can exist on
          # disk even after its own validate_qualitative.py call failed
          # (e.g. generation succeeded but validation didn't). Rendering
          # must fail open in that case, so require the step's own outcome
          # to be "success" in addition to file existence.
          if [ "$AI_COMMENTARY" = "true" ] \
            && [ "$QUALITATIVE_OUTCOME" = "success" ] \
            && [ -f "data/qualitative/${STEM}.json" ]; then
            ARGS+=(
              --qualitative "data/qualitative/${STEM}.json"
              --evidence "data/evidence/${STEM}.json"
            )
          fi
          uv run python .agents/skills/market-analysis/scripts/generate_report.py \
            "${ARGS[@]}"
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
      - name: Install Hugo
        uses: peaceiris/actions-hugo@2752ce1d29631191ea3f27c23495fa06139a5b78 # v3.2.1
        with:
          hugo-version: latest
          extended: true
      - name: Build Hugo site (validation)
        run: hugo --gc --minify
      - name: Create pull request
        id: pr
        if: steps.symbols.outputs.symbols != '' && env.DRY_RUN != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DATE: ${{ steps.date.outputs.date }}
          STEM: ${{ steps.date.outputs.stem }}
        run: |
          BRANCH="generated/analysis-${STEM}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          git fetch origin "$BRANCH" 2>/dev/null || true
          git checkout -B "$BRANCH"
          git add data/analysis/ data/history/ data/performance/ \
            content/results/ content/evaluation/ content/performance/
          # Evidence and qualitative artifacts (shadow mode) travel in the
          # same analysis PR; the directories exist only when the
          # qualitative steps ran.
          for QUAL_DIR in data/evidence data/qualitative; do
            if [ -d "$QUAL_DIR" ]; then
              git add "$QUAL_DIR"
            fi
          done
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "pr_url=" >> "$GITHUB_OUTPUT"
            echo "pr_number=" >> "$GITHUB_OUTPUT"
          else
            git commit -m "feat(analysis): daily market analysis ${DATE}"
            git push --force-with-lease -u origin "$BRANCH"
            PR_NUMBER="$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')"
            if [ -n "$PR_NUMBER" ]; then
              echo "PR #$PR_NUMBER already exists for $BRANCH; branch updated."
              PR_URL=$(gh pr view "$PR_NUMBER" --json url --jq '.url')
            else
              PR_URL=$(gh pr create \
                --title "feat(analysis): daily market analysis ${DATE}" \
                --body "Automated daily market analysis for ${DATE}." \
                --base main \
                --head "$BRANCH")
              PR_NUMBER="$(gh pr list --head "$BRANCH" --json number --jq '.[0].number // empty')"
            fi
            echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          fi
      - name: Merge analysis pull request
        if: steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          # All validation (artifact/history schema checks, Hugo build) has
          # already run earlier in this job, so merge immediately instead of
          # requesting `--auto`: main has no branch protection or required
          # status checks, and GitHub only allows auto-merge to be enabled on
          # a PR whose merge is blocked by such requirements, so `--auto`
          # fails outright here. A failed merge must fail this step (no
          # `|| echo` masking) so it routes into "Notify Slack (failure)".
          gh pr merge "$PR_NUMBER" --squash --delete-branch
      - name: Notify Slack (success)
        if: steps.symbols.outputs.symbols != '' && env.DRY_RUN != 'true' && env.SLACK_NOTIFICATIONS_ENABLED == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STEM: ${{ steps.date.outputs.stem }}
          PR_URL: ${{ steps.pr.outputs.pr_url }}
          QUALITATIVE_OUTCOME: ${{ steps.qualitative.outcome }}
        run: |
          ARGS=(
            --artifact "data/analysis/${STEM}.json"
            --history "data/history/${STEM}.json"
            --pr-url "${PR_URL}"
            --calendar data/calendars/macro_events.json
            --calendar data/calendars/earnings.json
          )
          # As in the report-render step, only trust the file once its own
          # step outcome confirms generation and validation both succeeded.
          if [ "$QUALITATIVE_OUTCOME" = "success" ] \
            && [ -f "data/qualitative/${STEM}.json" ]; then
            ARGS+=(--qualitative "data/qualitative/${STEM}.json")
          fi
          if [ "$QUALITATIVE_OUTCOME" = "failure" ]; then
            ARGS+=(--qualitative-failed)
          fi
          if [ -f "data/performance/${STEM}.json" ]; then
            ARGS+=(--performance "data/performance/${STEM}.json")
          fi
          if [ -f "data/performance/signals.json" ]; then
            ARGS+=(--signal-performance "data/performance/signals.json")
          fi
          uv run python .agents/skills/market-analysis/scripts/notify_slack.py \
            "${ARGS[@]}"
      - name: Notify Slack (failure)
        if: failure() && env.SLACK_NOTIFICATIONS_ENABLED == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          uv run python .agents/skills/market-analysis/scripts/notify_slack.py \
            --failure \
            --run-url \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --message "Daily market analysis workflow failed"
